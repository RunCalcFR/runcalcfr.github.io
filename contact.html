<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#0f172a;
color:white;
}

nav{
display:flex;
justify-content:center;
gap:20px;
padding:15px;
background:#0b1220;
position:sticky;
top:0;
}

nav a{
color:white;
text-decoration:none;

}

nav a:hover{

}

.container{
max-width:750px;
margin:auto;
padding:40px 20px;
}

h1{

}

.subtitle{
text-align:center;
color:#9ca3af;
margin-bottom:30px;
font-size:14px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.3);
}

label{
font-size:13px;
color:#cbd5e1;
}

input, textarea{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:15px;
border-radius:10px;

color:white;

}

}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
font-size:15px;
transition:0.2s;
}

button:hover{
background:#16a34a;
transform:scale(1.02);
}

.info{
margin-top:20px;
font-size:13px;
color:#9ca3af;
line-height:1.6;
}

.email-box{
margin-top:20px;
padding:15px;
background:#111827;
border-left:4px solid #22c55e;

<textarea name="message" rows="6" placeholder="Explique ton problème ou ton idée..." required></textarea>

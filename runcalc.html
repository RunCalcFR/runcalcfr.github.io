  <script>
let runs = JSON.parse(localStorage.getItem("runs")||"[]");
let history = JSON.parse(localStorage.getItem("history")||"[]");

/* VO2 TEST */
function calcVO2Test(){
let d=+vo2dist.value;
let t=vo2time.value;
if(!d||!t)return;

let p=t.split(":");
let tm=+p[0]+(+p[1]||0)/60;

let vo2=3.5*((d/tm)*60)*1.1;

vo2testOut.innerText=vo2.toFixed(1);
vo2.innerText=vo2.toFixed(1);
}

/* ALLURE */
function calcPace(){
let d=+dist.value;
let t=time.value;
if(!d||!t)return;

let tm=t.includes(":")?
+t.split(":")[0]+(+t.split(":")[1]||0)/60
:+t;

let pace=tm/d;
let m=Math.floor(pace);
let s=Math.round((pace-m)*60);

paceOut.innerText=`${m}:${s<10?"0":""}${s}`;

let speed=d/(tm/60);
speedOut.innerText=speed.toFixed(2);

let vo2=3.5*speed*1.1;
vo2.innerText=vo2.toFixed(1);

score.innerText=Math.max(0,100-pace*10).toFixed(1);

save(vo2,pace);
}

/* SPEED */
function calcSpeed(){
let v=paceInput.value.split(":");
speedOut.innerText=(60/(+v[0]+(+v[1]/60))).toFixed(2);
}

/* FC */
function calcFC(){
let m=+fcmax.value;
let a=+fcavg.value;
if(!m||!a)return;

let p=(a/m)*100;

zone.innerText=p<70?"EF":p<80?"Endurance":p<88?"Seuil":"VO2";
fcOut.innerText=p.toFixed(1)+"%";
}

/* RUNS */
function addRun(){
let d=+rDist.value;
let t=rTime.value;
if(!d||!t)return;

let tm=t.includes(":")?
+t.split(":")[0]+(+t.split(":")[1]||0)/60
:+t;

runs.push({d,t:tm,date:new Date().toLocaleDateString()});
localStorage.setItem("runs",JSON.stringify(runs));

last.innerText=`${d} km - ${t}`;
render();
}

/* SAVE */
function save(vo2,pace){
history.push({vo2,pace});
localStorage.setItem("history",JSON.stringify(history));
draw();
}

/* GRAPH */
function draw(){
let c=chart.getContext("2d");
c.clearRect(0,0,400,200);

let d=history.slice(-10);
c.beginPath();

d.forEach((h,i)=>{
let v=+h.vo2||0;
i?c.lineTo(i*40,200-v*2):c.moveTo(i*40,200-v*2);
});

c.strokeStyle="#22c55e";
c.stroke();
}

/* INIT */
function render(){
runList.innerHTML=runs.slice(-10)
.map(r=>`📅 ${r.date} - ${r.d}km / ${r.t}min`)
.join("<br>");

draw();
}

render();
draw();
</script>

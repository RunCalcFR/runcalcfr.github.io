<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Calculateur d’allure, vitesse et performances</p>
</header>

<div class="container">

  <div class="card">
    <h2>Allure → Vitesse</h2>
    <input id="pace" placeholder="Allure (min/km ex: 4:30)">
    <button onclick="calcSpeed()">Calculer</button>
    <div class="result" id="speedResult"></div>
  </div>

  <div class="card">
    <h2>Distance / Temps</h2>
    <input id="time" placeholder="Temps (minutes ex: 30)">
    <input id="speed" placeholder="Vitesse (km/h ex: 12)">
    <button onclick="calcDistance()">Calculer</button>
    <div class="result" id="distResult"></div>
  </div>

</div>

<script>
function calcSpeed() {
  let pace = document.getElementById("pace").value;
  let parts = pace.split(":");
  let min = parseInt(parts[0]);
  let sec = parseInt(parts[1] || 0);

  let totalMin = min + sec/60;
  let speed = 60 / totalMin;

  document.getElementById("speedResult").innerText =
    "Vitesse : " + speed.toFixed(2) + " km/h";
}

function calcDistance() {
  let time = parseFloat(document.getElementById("time").value);
  let speed = parseFloat(document.getElementById("speed").value);

  let distance = (time / 60) * speed;

  document.getElementById("distResult").innerText =
    "Distance : " + distance.toFixed(2) + " km";
}
</script>

</body>

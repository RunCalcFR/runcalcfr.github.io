<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 10px;
  background: #111a2e;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  background: #22c55e;
  border-radius: 8px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 18px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 10px;
  color: #60ffa8;
}

.footer {
  text-align: center;
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>

</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Ton coach running intelligent</p>
</header>

<nav>
  <a href="#vo2">VO2</a>
  <a href="#speed">Vitesse</a>
  <a href="#distance">Distance</a>
</nav>

<div class="container">

<!-- VO2 -->
<div class="card" id="vo2">
  <h2>VO2 Max</h2>
  <input id="vo2_distance" placeholder="Distance (km)">
  <input id="vo2_time" placeholder="Temps (min)">
  <button onclick="calcVO2()">Calculer VO2</button>
  <div class="result" id="vo2_result"></div>
</div>

<!-- SPEED -->
<div class="card" id="speed">
  <h2>Allure → Vitesse</h2>
  <input id="pace" placeholder="ex: 4:30">
  <button onclick="calcSpeed()">Calculer</button>
  <div class="result" id="speed_result"></div>
</div>

<!-- DISTANCE -->
<div class="card" id="distance">
  <h2>Distance</h2>
  <input id="dist_time" placeholder="Temps (min)">
  <input id="dist_speed" placeholder="Vitesse (km/h)">
  <button onclick="calcDistance()">Calculer</button>
  <div class="result" id="dist_result"></div>
</div>

</div>

<div class="footer">RunCalc © 2026</div>

<script>

// VO2 MAX
function calcVO2() {
  const d = parseFloat(document.getElementById("vo2_distance").value);
  const t = parseFloat(document.getElementById("vo2_time").value);

  if (isNaN(d) || isNaN(t) || d <= 0 || t <= 0) {
    document.getElementById("vo2_result").innerText = "Valeurs invalides";
    return;
  }

  const speed = (d / t) * 60;
  const vo2 = 3.5 * speed;

  document.getElementById("vo2_result").innerText =
    "VO2 max : " + vo2.toFixed(1);
}


// SPEED
function calcSpeed() {
  const val = document.getElementById("pace").value.split(":");

  if (val.length !== 2) {
    document.getElementById("speed_result").innerText = "Format invalide";
    return;
  }

  const min = Number(val[0]);
  const sec = Number(val[1]);

  if (isNaN(min) || isNaN(sec)) {
    document.getElementById("speed_result").innerText = "Valeurs invalides";
    return;
  }

  const speed = 60 / (min + sec / 60);

  document.getElementById("speed_result").innerText =
    speed.toFixed(2) + " km/h";
}


// DISTANCE
function calcDistance() {
  const t = parseFloat(document.getElementById("dist_time").value);
  const s = parseFloat(document.getElementById("dist_speed").value);

  if (isNaN(t) || isNaN(s) || t <= 0 || s <= 0) {
    document.getElementById("dist_result").innerText = "Valeurs invalides";
    return;
  }

  const dist = (t / 60) * s;

  document.getElementById("dist_result").innerText =
    dist.toFixed(2) + " km";
}

</script>

</body>
</html>

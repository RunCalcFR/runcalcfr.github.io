<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

header p {
  margin: 5px 0 0;
  opacity: 0.9;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 18px;
  border-radius: 15px;
}

h2 {
  margin-top: 0;
  font-size: 18px;
  color: #22c55e;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 10px;
  color: #60ffa8;
  font-weight: bold;
}

.footer {
  text-align: center;
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Ton coach running intelligent</p>
</header>

<div class="container">

<!-- LOGIN -->
<div class="card">
  <h2>🔐 Compte utilisateur</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
  <button onclick="logout()">Déconnexion</button>

  <div class="result" id="authMsg"></div>
</div>

<!-- VO2 -->
<div class="card">
  <h2>VO2 Max</h2>
  <input id="distance" placeholder="Distance (km)">
  <input id="timeMin" placeholder="Temps (min)">
  <button onclick="calcVO2()">Calculer VO2</button>
  <div class="result" id="vo2Result"></div>
</div>

<!-- CLASSEMENT GLOBAL -->
<div class="card">
  <h2>🏁 Classement mondial coureurs</h2>

  <input id="name" placeholder="Ton prénom">
  <input id="rankTime" placeholder="Temps 5 km (min)">

  <button onclick="addRunner()">Ajouter performance</button>

  <div class="result" id="rankMsg"></div>

  <h3>Classement :</h3>
  <div id="rankList"></div>
</div>

</div>

<div class="footer">RunCalc © 2026</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCRtSV6MHQbUZuldnUvtT-_WXb5DmzxTek",
  authDomain: "runcalc-ef00e.firebaseapp.com",
  projectId: "runcalc-ef00e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// AUTH
function signup() {
  auth.createUserWithEmailAndPassword(
    email.value, password.value
  ).then(() => authMsg.innerText = "Compte créé ✔");
}

function login() {
  auth.signInWithEmailAndPassword(
    email.value, password.value
  ).then(() => authMsg.innerText = "Connecté ✔");
}

function logout() {
  auth.signOut();
  authMsg.innerText = "Déconnecté";
}


// VO2
function calcVO2() {
  let d = Number(distance.value);
  let t = Number(timeMin.value);

  let vo2 = 0.2 * ((d * 1000) / t) + 3.5;

  vo2Result.innerText = "VO2 max : " + vo2.toFixed(1);
}


// CLASSEMENT GLOBAL (FIREBASE)
async function addRunner() {
  let user = auth.currentUser;

  if (!user) {
    rankMsg.innerText = "Connecte-toi d'abord";
    return;
  }

  await db.collection("runners").add({
    name: name.value,
    time: Number(rankTime.value),
    email: user.email,
    uid: user.uid,
    createdAt: Date.now()
  });

  rankMsg.innerText = "Ajouté en ligne ✔";
  loadRanking();
}


// AFFICHAGE GLOBAL
async function loadRanking() {
  let snap = await db.collection("runners")
    .orderBy("time", "asc")
    .get();

  let html = "";
  let i = 1;

  snap.forEach(doc => {
    let d = doc.data();
    html += `${i}. ${d.name} (${d.email}) - ${d.time} min<br>`;
    i++;
  });

  rankList.innerHTML = html;
}

loadRanking();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 10px;
  background: #111a2e;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  background: #22c55e;
  border-radius: 8px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 18px;
  border-radius: 15px;
}

input, select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  color: #60ffa8;
}

.footer {
  text-align: center;
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Ton coach running intelligent</p>
</header>

<nav>
  <a href="#vo2">VO2</a>
  <a href="#speed">Vitesse</a>
  <a href="#distance">Distance</a>
  <a href="#plan">Plan</a>
  <a href="#objectif">Objectif</a>
  <a href="#fc">FC</a>
  <a href="#rank">Classement</a>
</nav>

<div class="container">

<!-- COMPTE -->
<div class="card">
  <h2>🔐 Compte</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="signup()">Inscription</button>
  <button onclick="login()">Connexion</button>
  <button onclick="logout()">Déconnexion</button>
  <div class="result" id="authMsg"></div>
</div>

<!-- VO2 -->
<div class="card" id="vo2">
  <h2>VO2 Max</h2>
  <input id="vo2_distance" placeholder="Distance (km)">
  <input id="vo2_time" placeholder="Temps (min)">
  <button onclick="calcVO2()">Calculer</button>
  <div class="result" id="vo2_result"></div>
</div>

<!-- SPEED -->
<div class="card" id="speed">
  <h2>Vitesse</h2>
  <input id="pace" placeholder="ex: 4:30">
  <button onclick="calcSpeed()">Calculer</button>
  <div class="result" id="speed_result"></div>
</div>

<!-- DISTANCE -->
<div class="card" id="distance">
  <h2>Distance</h2>
  <input id="dist_time" placeholder="Temps (min)">
  <input id="dist_speed" placeholder="Vitesse (km/h)">
  <button onclick="calcDistance()">Calculer</button>
  <div class="result" id="dist_result"></div>
</div>

<!-- PLAN -->
<div class="card" id="plan">
  <h2>Plan 5 km</h2>
  <input id="time5k" placeholder="Temps 5 km">
  <button onclick="analyseNiveau()">Analyser</button>
  <div class="result" id="levelResult"></div>
  <div id="planResult"></div>
</div>

<!-- OBJECTIF -->
<div class="card" id="objectif">
  <h2>🎯 Objectif course personnalisé</h2>

  <input id="obj_distance" placeholder="Distance (5 / 10 / 21)">
  <input id="obj_record" placeholder="Record actuel (min)">
  <input id="obj_target" placeholder="Objectif (min)">

  <button onclick="generatePlan()">Créer mon plan</button>
  <div id="obj_result" class="result"></div>
</div>

<!-- FC -->
<div class="card" id="fc">
  <h2>Fréquence cardiaque</h2>
  <input id="fcmax" placeholder="FC max">
  <input id="fcmoy" placeholder="FC moyenne">
  <button onclick="analyseFC()">Analyser</button>
  <div class="result" id="fcResult"></div>
</div>

<!-- CLASSEMENT -->
<div class="card" id="rank">
  <h2>Classement</h2>
  <input id="name" placeholder="Nom">
  <input id="rankTime" placeholder="Temps 5 km">
  <button onclick="addRunner()">Ajouter</button>
  <div class="result" id="rankMsg"></div>
  <div id="rankList"></div>
</div>

<!-- ESTIMATION -->
<div class="card">
  <h2>📊 Estimation performances</h2>

  <select id="est_dist">
    <option value="5">5 km</option>
    <option value="10">10 km</option>
    <option value="21.1">Semi-marathon</option>
    <option value="42.195">Marathon</option>
  </select>

  <input id="est_time" placeholder="Temps (min)">
  <button onclick="estimate()">Estimer</button>

  <div class="result" id="est_result"></div>
</div>

</div>

<div class="footer">RunCalc © 2026</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCRtSV6MHQbUZuldnUvtT-_WXb5DmzxTek",
  authDomain: "runcalc-ef00e.firebaseapp.com",
  projectId: "runcalc-ef00e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// AUTH
function signup(){ auth.createUserWithEmailAndPassword(email.value,password.value).then(()=>authMsg.innerText="OK"); }
function login(){ auth.signInWithEmailAndPassword(email.value,password.value).then(()=>authMsg.innerText="OK"); }
function logout(){ auth.signOut(); authMsg.innerText="Déconnecté"; }

// VO2
function calcVO2(){
  const d = Number(vo2_distance.value);
  const t = Number(vo2_time.value);
  const speed = (d / t) * 60;
  vo2_result.innerText = "VO2 : " + (3.5 * speed).toFixed(1);
}

// SPEED
function calcSpeed(){
  const p = pace.value.split(":");
  const speed = 60 / (Number(p[0]) + Number(p[1]) / 60);
  speed_result.innerText = speed.toFixed(2) + " km/h";
}

// DISTANCE
function calcDistance(){
  const t = Number(dist_time.value);
  const s = Number(dist_speed.value);
  dist_result.innerText = ((t / 60) * s).toFixed(2) + " km";
}

// PLAN
function analyseNiveau(){
  const t = Number(time5k.value);

  levelResult.innerText =
    t > 25 ? "Débutant" : t > 21 ? "Intermédiaire" : "Avancé";

  planResult.innerHTML =
    "S1: 8x400m<br>S2: 10x400m seuil<br>S3: 6x800m<br>S4: test";
}

// OBJECTIF
function generatePlan(){
  const d = obj_distance.value;
  const rec = Number(obj_record.value);
  const tar = Number(obj_target.value);

  let plan = "";

  if(d === "5") plan = "Fractionné + vitesse";
  else if(d === "10") plan = "Seuil + endurance";
  else if(d === "21") plan = "Sortie longue + seuil";

  obj_result.innerHTML =
    "Record: " + rec + " min<br>" +
    "Objectif: " + tar + " min<br><br>" +
    plan;
}

// FC (CORRIGÉ + ZONES)
function analyseFC(){
  const max = Number(fcmax.value);
  const moy = Number(fcmoy.value);

  if(isNaN(max) || isNaN(moy) || max <= 0){
    fcResult.innerText = "Valeurs invalides";
    return;
  }

  const pct = (moy / max) * 100;

  let zone = "";

  if(pct < 70){
    zone = "Footing de récupération";
  }
  else if(pct < 80){
    zone = "Footing endurance fondamentale";
  }
  else if(pct < 90){
    zone = "Seuil / effort soutenu";
  }
  else{
    zone = "Effort maximal";
  }

  fcResult.innerText = pct.toFixed(1) + "% - " + zone;
}

// CLASSEMENT
async function addRunner(){
  await db.collection("runners").add({
    name:name.value,
    time:Number(rankTime.value)
  });

  rankMsg.innerText="Ajouté";
  loadRanking();
}

async function loadRanking(){
  const snap = await db.collection("runners").orderBy("time").get();

  let html = "";
  let i = 1;

  snap.forEach(d=>{
    html += i++ + ". " + d.data().name + " - " + d.data().time + " min<br>";
  });

  rankList.innerHTML = html;
}

loadRanking();

// ESTIMATION
function estimate(){
  const D1 = Number(est_dist.value);
  const T1 = Number(est_time.value);

  const distances = [5,10,21.1,42.195];
  let text = "";

  distances.forEach(D2=>{
    if(D2 !== D1){
      const T2 = T1 * Math.pow(D2 / D1, 1.06);
      text += D2 + " km ≈ " + T2.toFixed(1) + " min<br>";
    }
  });

  est_result.innerHTML = text;
}

</script>

</body>
</html>

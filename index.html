<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunHub Pro</title>

<style>
body{
  <body>

<header>
<h1>🏃 RunHub Pro</h1>
</header>

<nav>
<a href="#dashboard">Dashboard</a>
<a href="#calc">Calculs</a>
<a href="#runs">Runs</a>
<a href="#training">Training</a>
<a href="#stats">Stats</a>
</nav>

<div class="container">

<section id="dashboard" class="section">
<h2 class="section-title">📊 Dashboard</h2>
<section id="calc" class="section">
<h2 class="section-title">🧮 Calculs</h2>

<div class="grid">

<div class="card">
<h3>Allure</h3>
<input id="dist" placeholder="Distance km (ex 5)">
<input id="time" placeholder="Temps min (ex 25)">
<button onclick="calcPace()">Calculer</button>
<div id="paceOut"></div>
</div>

<div class="card">
<h3>Vitesse</h3>
<input id="pace" placeholder="ex 4:30">
<button onclick="calcSpeed()">Calculer</button>
<div id="speedOut"></div>
</div>

<div class="card">
<h3>Fréquence cardiaque</h3>
<input id="fcmax" placeholder="FC max">
<input id="fcavg" placeholder="FC moyenne">
<button onclick="calcFC()">Analyser</button>
<div id="fcOut"></div>
</div>

</div>
</section>

<section id="training" class="section">
<h2 class="section-title">📅 Programmes d’entraînement</h2>

<div class="grid">

<div class="card">
<b>Débutant</b><br>
- 3 séances/semaine<br>
- footing 30 min<br>
- footing léger + récup
</div>

<div class="card">
<b>Intermédiaire</b><br>
- 4 séances/semaine<br>
- fractionné<br>
- sortie longue<br>
- footing
</div>

<div class="card">
<b>Avancé</b><br>
- 5-6 séances/semaine<br>
- VO2 max<br>
- seuil<br>
- endurance fondamentale
</div>

</div>
</section>
<div class="grid">
<div class="card">
VO2 Max
<div id="vo2">--</div>
</div>

<div class="card">
Score forme
<div id="score">--</div>
</div>

<div class="card">
FC zone
<div id="zone">--</div>
</div>

<div class="card">
Dernière perf
<div id="last">--</div>
</div>
</div>
</section>
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#22c55e,#10b981);
padding:20px;
text-align:center;
}

nav{
position:sticky;
top:0;
background:#0f172a;
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
background:#1f2937;
padding:8px 12px;
border-radius:8px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.section{
margin-top:40px;
}

.section-title{
border-left:4px solid #22c55e;
padding-left:10px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#111a2e;
padding:15px;
border-radius:12px;
}

input, button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
}

input{
background:#0b1220;
color:white;
}

button{
background:#22c55e;
font-weight:bold;
cursor:pointer;
}
</style>
<section id="runs" class="section">
<h2 class="section-title">🏃 Runs</h2>

<div class="card">
<input id="rDist" placeholder="Distance km">
<input id="rTime" placeholder="Temps min">
<button onclick="addRun()">Ajouter run</button>
<div id="runList"></div>
</div>
</section>

<section id="stats" class="section">
<h2 class="section-title">📈 Stats</h2>

<canvas id="graph" width="400" height="200"></canvas>
</section>

</div>

<script>
let runs = JSON.parse(localStorage.getItem("runs")||"[]");

/* CALCUL ALLURE */
function calcPace(){
let d=+dist.value;
let t=+time.value;
if(!d||!t)return;

let p=t/d;
paceOut.innerText=p.toFixed(2)+" min/km";

vo2.innerText=(3.5*(d/t*60)).toFixed(1);
save();
}

/* VITESSE */
function calcSpeed(){
let v=pace.value.split(":");
let m=+v[0], s=+v[1];
speedOut.innerText=(60/(m+s/60)).toFixed(2)+" km/h";
}

/* FC */
function calcFC(){
let max=+fcmax.value;
let avg=+fcavg.value;
let p=(avg/max)*100;

zone.innerText=
p<70?"EF":p<80?"Endurance":p<88?"Seuil":"VO2 max";

fcOut.innerText=p.toFixed(1)+"%";
}

/* RUNS */
function addRun(){
let r={
d:+rDist.value,
t:+rTime.value,
date:new Date().toLocaleDateString()
};

runs.push(r);
localStorage.setItem("runs",JSON.stringify(runs));
render();
}

/* RENDER */
function render(){
runList.innerHTML=runs.slice(-10).map(r=>
`📅 ${r.date} - ${r.d}km / ${r.t}min`
).join("<br>");

if(runs.length){
let last=runs[runs.length-1];
last.innerText=`${last.d}km - ${last.t}min`;
}
}

/* GRAPH SIMPLE */
function graph(){
let c=graph.getContext("2d");
c.clearRect(0,0,400,200);

c.beginPath();
runs.slice(-10).forEach((r,i)=>{
c.lineTo(i*40,200-r.t*2);
});
c.stroke();
}

function save(){
localStorage.setItem("runs",JSON.stringify(runs));
graph();
}

render();
graph();
</script>

</body>
</html>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

header p {
  margin: 5px 0 0;
  opacity: 0.9;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 18px;
  border-radius: 15px;
}

h2 {
  margin-top: 0;
  font-size: 18px;
  color: #22c55e;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 10px;
  color: #60ffa8;
  font-weight: bold;
}

.footer {
  text-align: center;
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Ton coach running intelligent</p>
</header>

<div class="container">

<!-- VO2 -->
<div class="card">
  <h2>VO2 Max</h2>
  <input id="distance" placeholder="Distance (km)">
  <input id="timeMin" placeholder="Temps (min)">
  <button onclick="calcVO2()">Calculer VO2</button>
  <div class="result" id="vo2Result"></div>
</div>

<!-- ALLURE -->
<div class="card">
  <h2>Allure → Vitesse</h2>
  <input id="pace" placeholder="4:30">
  <button onclick="calcSpeed()">Calculer</button>
  <div class="result" id="speedResult"></div>
</div>

<!-- DISTANCE -->
<div class="card">
  <h2>Distance</h2>
  <input id="time" placeholder="Temps (min)">
  <input id="speed" placeholder="Vitesse (km/h)">
  <button onclick="calcDistance()">Calculer</button>
  <div class="result" id="distResult"></div>
</div>

<!-- PLAN -->
<div class="card">
  <h2>Plan 4 semaines - 5 km 17:30</h2>

  <input id="time5k" placeholder="Ton temps 5 km">
  <button onclick="analyseNiveau()">Analyser + programme</button>

  <div class="result" id="levelResult"></div>
  <div id="planResult"></div>
</div>

<!-- CLASSEMENT -->
<div class="card">
  <h2>🏁 Classement coureurs</h2>

  <input id="name" placeholder="Ton prénom">
  <input id="rankTime" placeholder="Temps 5 km (min)">

  <button onclick="addRunner()">Ajouter au classement</button>

  <div class="result" id="rankMsg"></div>

  <h3>Classement :</h3>
  <div id="rankList"></div>
</div>

</div>

<div class="footer">RunCalc © 2026</div>

<script>

// VO2
function calcVO2() {
  let d = Number(document.getElementById("distance").value);
  let t = Number(document.getElementById("timeMin").value);

  let vo2 = 0.2 * ((d * 1000) / t) + 3.5;

  document.getElementById("vo2Result").innerText =
    "VO2 max : " + vo2.toFixed(1);
}

// SPEED
function calcSpeed() {
  let p = document.getElementById("pace").value.split(":");
  let speed = 60 / (Number(p[0]) + Number(p[1] || 0) / 60);

  document.getElementById("speedResult").innerText =
    speed.toFixed(2) + " km/h";
}

// DISTANCE
function calcDistance() {
  let t = Number(document.getElementById("time").value);
  let s = Number(document.getElementById("speed").value);

  document.getElementById("distResult").innerText =
    ((t / 60) * s).toFixed(2) + " km";
}

// PLAN
function analyseNiveau() {
  let time = Number(document.getElementById("time5k").value);

  let level = time > 25 ? "Débutant" :
              time > 21 ? "Intermédiaire" :
              "Avancé";

  document.getElementById("levelResult").innerText =
    "Niveau : " + level;

  document.getElementById("planResult").innerHTML = getPlan();
}

function getPlan() {
  return `
<b>Semaine 1</b><br>
Lundi : footing 30 min<br>
Mardi : 8x400m<br>
Mercredi : repos<br>
Jeudi : footing 35 min<br>
Vendredi : seuil 15 min<br>
Samedi : repos<br>
Dimanche : 45 min<br><br>

<b>Semaine 2</b><br>
Lundi : footing 35 min<br>
Mardi : 10x400m<br>
Mercredi : repos<br>
Jeudi : 20 min seuil<br>
Vendredi : footing léger<br>
Samedi : repos<br>
Dimanche : 50 min<br><br>

<b>Semaine 3</b><br>
Lundi : footing 40 min<br>
Mardi : 5x800m<br>
Mercredi : repos<br>
Jeudi : 25 min seuil<br>
Vendredi : footing<br>
Samedi : repos<br>
Dimanche : 55 min<br><br>

<b>Semaine 4</b><br>
Prépa test 5 km 🎯 objectif 17:30
`;
}

// CLASSEMENT
function getRunners() {
  return JSON.parse(localStorage.getItem("runners") || "[]");
}

function saveRunners(r) {
  localStorage.setItem("runners", JSON.stringify(r));
}

function addRunner() {
  let name = document.getElementById("name").value;
  let time = Number(document.getElementById("rankTime").value);

  if (!name || !time) return;

  let runners = getRunners();

  runners.push({ name, time });

  runners.sort((a,b) => a.time - b.time);

  saveRunners(runners);

  document.getElementById("rankMsg").innerText = "Ajouté !";

  showRanking();
}

function showRanking() {
  let runners = getRunners();

  document.getElementById("rankList").innerHTML =
    runners.map((r,i) =>
      (i+1) + ". " + r.name + " - " + r.time + " min"
    ).join("<br>");
}

showRanking();

</script>

</body>
</html>

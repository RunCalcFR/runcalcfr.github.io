<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc - Quel est ton niveau running ?</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
  text-align: center;
}

header {
  padding: 40px 20px;
  background: linear-gradient(90deg, #22c55e, #16a34a);
}

h1 {
  font-size: 32px;
  margin: 0;
}

p {
  opacity: 0.9;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 10px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

.result {
  margin-top: 15px;
  font-weight: bold;
  color: #60ffa8;
  font-size: 18px;
}

.badge {
  display: inline-block;
  padding: 8px 12px;
  border-radius: 20px;
  background: #1f2937;
  margin: 5px;
  font-size: 12px;
}

.footer {
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Découvre ton niveau en course à pied en 10 secondes</p>
</header>

<div class="container">

  <div class="card">
    <h2>🔥 Test rapide</h2>
    <p>Entre ton temps sur 5 km</p>

    <input id="time5k" placeholder="Ex : 20 (minutes)">
    <button onclick="testLevel()">Découvrir mon niveau</button>

    <div class="result" id="result"></div>
  </div>

  <div class="card">
    <h2>🎯 Ce que tu vas obtenir</h2>

    <div class="badge">Ton niveau</div>
    <div class="badge">Ton VO2 max</div>
    <div class="badge">Ton objectif 5 km</div>
    <div class="badge">Ton plan d’entraînement</div>
  </div>

  <div class="card">
    <h2>⚡ Objectif ultime</h2>
    <p>Arriver à courir 5 km en 17:30</p>
  </div>

</div>

<div class="footer">
RunCalc © 2026
</div>

<script>

function testLevel() {
  let t = Number(document.getElementById("time5k").value);

  let msg = "";
  let level = "";

  if (t > 25) {
    level = "Débutant";
    msg = "Tu débutes → énorme potentiel 💪";
  } 
  else if (t > 21) {
    level = "Intermédiaire";
    msg = "Bon niveau → tu peux progresser vite ⚡";
  } 
  else if (t > 18) {
    level = "Avancé";
    msg = "Très fort 🔥 proche élite";
  } 
  else {
    level = "Niveau élite";
    msg = "Incroyable 💀 objectif 17:30 atteint ou proche";
  }

  document.getElementById("result").innerHTML =
    "Niveau : " + level + "<br>" + msg;
}

</script>

</body>
</html>

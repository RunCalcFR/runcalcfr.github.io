<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc Pro Plus</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#22c55e,#16a34a);
padding:25px;
text-align:center;
}

nav{
position:sticky;
top:0;
background:#111a2e;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:10px;
}

nav a{
color:white;
background:#22c55e;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.card{
background:#111a2e;
padding:15px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0b1220;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:10px;
color:#60ffa8;
font-weight:bold;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
</script>

</head>

<body>

<header>
<h1>🏃 RunCalc Pro Plus</h1>
<p>Coach running intelligent</p>
</header>

<nav>
<a href="#accueil">Accueil</a>
<a href="#calculs">Calculs</a>
<a href="#perf">Performance</a>
<a href="#classement">Classement</a>
<a href="#profil">Profil</a>
</nav>

<div class="container">

<!-- DASHBOARD -->
<h2 id="accueil">🏠 Dashboard</h2>

<div class="grid">
<div class="card">
<h3>VO2 Max</h3>
<div id="homeVo2">--</div>
</div>

<div class="card">
<h3>Objectif</h3>
<div>5 km rapide</div>
</div>
</div>

<!-- CALCULS -->
<h2 id="calculs">📊 Calculs</h2>

<div class="grid">

<div class="card">
<h3>VO2 Max</h3>
<input id="vo2_distance" placeholder="km ex: 5">
<input id="vo2_time" placeholder="min ex: 20">
<button onclick="calcVO2()">Calculer</button>
<div id="vo2_result" class="result"></div>
</div>

<div class="card">
<h3>Vitesse</h3>
<input id="pace" placeholder="4:30">
<button onclick="calcSpeed()">Calculer</button>
<div id="speed_result" class="result"></div>
</div>

<div class="card">
<h3>Distance</h3>
<input id="dist_time" placeholder="min">
<input id="dist_speed" placeholder="km/h">
<button onclick="calcDistance()">Calculer</button>
<div id="dist_result" class="result"></div>
</div>

<div class="card">
<h3>FC</h3>
<input id="fcmax" placeholder="FC max">
<input id="fcmoy" placeholder="FC moyenne">
<button onclick="analyseFC()">Analyser</button>
<div id="fcResult" class="result"></div>
</div>

</div>

<!-- PERFORMANCE -->
<h2 id="perf">🚀 Performance</h2>

<div class="grid">

<div class="card">
<h3>Plan 5 km</h3>
<input id="time5k" placeholder="5 km temps">
<button onclick="plan5k()">OK</button>
<div id="planResult"></div>
</div>

<div class="card">
<h3>Estimation</h3>
<input id="est_dist" placeholder="Distance (ex: 10 km)">
<input id="est_time" placeholder="Temps (ex: 45 min)">
<button onclick="estimate()">OK</button>
<div id="estResult"></div>
</div>

<div class="card">
<h3>Allures</h3>
<input id="allure5k" placeholder="Temps 5 km (ex: 20 min)">
<button onclick="calcAllures()">OK</button>
<div id="allureResult"></div>
</div>

</div>

<!-- CLASSEMENT -->
<h2 id="classement">🏆 Classement</h2>

<div class="card">
<input id="name" placeholder="Nom">
<input id="rankTime" placeholder="Temps">
<button onclick="addRunner()">Ajouter</button>
<div id="rankList"></div>
</div>

<!-- PROFIL -->
<h2 id="profil">👤 Profil</h2>

<div class="card">
<input id="profilNom" placeholder="Nom">
<input id="profilAge" placeholder="Âge">
<input id="profilPoids" placeholder="Poids">
<input id="profilFcMax" placeholder="FC max">
<button onclick="saveProfile()">Sauvegarder</button>
</div>

<!-- LOGIN -->
<div class="card">
<h3>Connexion</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="signup()">Signup</button>
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>

// ===================== CALCULS =====================

function calcVO2(){
let d=Number(vo2_distance.value);
let t=Number(vo2_time.value);
if(!d||!t)return vo2_result.innerText="Erreur";
let vo2=(3.5*(d/t*60)).toFixed(1);
vo2_result.innerText="VO2: "+vo2;
homeVo2.innerText=vo2;
}

function calcSpeed(){
let v=pace.value;
if(!v.includes(":"))return speed_result.innerText="4:30";
let [m,s]=v.split(":").map(Number);
speed_result.innerText=(60/(m+s/60)).toFixed(2)+" km/h";
}

function calcDistance(){
let t=Number(dist_time.value);
let v=Number(dist_speed.value);
if(!t||!v)return dist_result.innerText="Erreur";
dist_result.innerText=((t/60)*v).toFixed(2)+" km";
}

function analyseFC(){
let max=Number(fcmax.value);
let moy=Number(fcmoy.value);
if(!max||!moy)return fcResult.innerText="Erreur";
let p=(moy/max)*100;
fcResult.innerText=p.toFixed(1)+"%";
}

// ===================== PERFORMANCE =====================

function plan5k(){
let t=Number(time5k.value);
planResult.innerText=t>25?"Débutant":t>21?"Inter":"Avancé";
}

function estimate(){
let d=Number(est_dist.value);
let t=Number(est_time.value);
estResult.innerHTML=[5,10,21,42].map(x=>
x+" km : "+(t*Math.pow(x/d,1.06)).toFixed(1)
).join("<br>");
}

function calcAllures(){
let t=Number(allure5k.value);
let a=t/5;
allureResult.innerHTML="EF "+(a+1.1).toFixed(2);
}

// ===================== FIREBASE =====================

async function addRunner(){
await db.collection("runners").add({
name:name.value,
time:Number(rankTime.value)
});
loadRanking();
}

async function loadRanking(){
let snap=await db.collection("runners").orderBy("time").get();
let html="",i=1;
snap.forEach(d=>{
html+=i+++". "+d.data().name+" - "+d.data().time+"<br>";
});
rankList.innerHTML=html;
}
loadRanking();

// ===================== AUTH =====================

function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function logout(){
auth.signOut();
}

// ===================== PROFILE =====================

function saveProfile(){
let u=auth.currentUser;
if(!u)return;
db.collection("profiles").doc(u.uid).set({
nom:profilNom.value,
age:profilAge.value,
poids:profilPoids.value,
fc:profilFcMax.value
});
}

</script>

</body>
</html>

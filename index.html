<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc Pro Plus</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#22c55e,#16a34a);
padding:25px;
text-align:center;
}

nav{
position:sticky;
top:0;
background:#111a2e;
display:flex;
gap:10px;
justify-content:center;
padding:10px;
flex-wrap:wrap;
}

nav a{
color:white;
background:#22c55e;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.card{
background:#111a2e;
padding:15px;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
background:#0b1220;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:10px;
color:#60ffa8;
font-weight:bold;
}

.stat{
background:#111a2e;
padding:15px;
border-radius:12px;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>

// 🔥 CONFIG FIREBASE (TON PROJET)
const firebaseConfig = {
  apiKey: "AIzaSyBFpxJIxLgmbxKfdEaanhN4kuhWAf9pkTE",
  authDomain: "runcalc-38716.firebaseapp.com",
  projectId: "runcalc-38716",
  storageBucket: "runcalc-38716.appspot.com",
  messagingSenderId: "1065168370740",
  appId: "1:1065168370740:web:1c67250311a2bb665f5e61"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// =====================
// VO2 MAX
// =====================
function calcVO2(){
let d = Number(document.getElementById("vo2_distance").value);
let t = Number(document.getElementById("vo2_time").value);

let v = (d/t)*60;
let vo2 = (3.5*v).toFixed(1);

document.getElementById("vo2_result").innerText = "VO2 Max : " + vo2;
}


// =====================
// SPEED
// =====================
function calcSpeed(){
let p = document.getElementById("pace").value.split(":");
let m = +p[0], s = +p[1];
let speed = 60/(m + s/60);

document.getElementById("speed_result").innerText =
speed.toFixed(2) + " km/h";
}


// =====================
// DISTANCE
// =====================
function calcDistance(){
let t = Number(document.getElementById("dist_time").value);
let v = Number(document.getElementById("dist_speed").value);

document.getElementById("dist_result").innerText =
((t/60)*v).toFixed(2) + " km";
}


// =====================
// FC
// =====================
function analyseFC(){
let max = Number(document.getElementById("fcmax").value);
let moy = Number(document.getElementById("fcmoy").value);

let pct = (moy/max)*100;

let zone =
pct < 70 ? "Récupération" :
pct < 80 ? "Endurance" :
pct < 88 ? "Seuil" :
pct < 95 ? "VO2 Max" :
"Max";

document.getElementById("fcResult").innerText =
pct.toFixed(1) + "% - " + zone;
}


// =====================
// AUTH
// =====================
function signup(){
auth.createUserWithEmailAndPassword(
email.value, password.value
).then(()=>alert("Compte créé"))
.catch(e=>alert(e.message));
}

function login(){
auth.signInWithEmailAndPassword(
email.value, password.value
).then(()=>alert("Connecté"))
.catch(e=>alert(e.message));
}

function logout(){
auth.signOut();
}


// =====================
// PROFIL
// =====================
function saveProfile(){

const user = auth.currentUser;
if(!user) return alert("Connecte-toi");

db.collection("profiles").doc(user.uid).set({
nom: profilNom.value,
age: profilAge.value,
poids: profilPoids.value,
fc: profilFcMax.value
});

alert("Profil sauvegardé");
}


// =====================
// CLASSEMENT
// =====================
async function addRunner(){

await db.collection("runners").add({
name: name.value,
time: Number(rankTime.value),
date: Date.now()
});

loadRanking();
}

async function loadRanking(){

const snap = await db.collection("runners")
.orderBy("time")
.get();

let html = "";
let i = 1;

snap.forEach(doc=>{
html += `${i++}. ${doc.data().name} - ${doc.data().time} min<br>`;
});

rankList.innerHTML = html;
}

loadRanking();

</script>

</head>

<body>

<header>
<h1>🏃 RunCalc Pro Plus</h1>
</header>

<nav>
<a href="#calc">Calculs</a>
<a href="#rank">Classement</a>
<a href="#profil">Profil</a>
</nav>

<div class="container">

<!-- LOGIN -->
<div class="card">
<h2>Connexion</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="signup()">Inscription</button>
<button onclick="login()">Connexion</button>
<button onclick="logout()">Déconnexion</button>
</div>

<!-- VO2 -->
<div class="card">
<h2>VO2 Max</h2>
<input id="vo2_distance">
<input id="vo2_time">
<button onclick="calcVO2()">Calculer</button>
<div id="vo2_result"></div>
</div>

<!-- SPEED -->
<div class="card">
<h2>Vitesse</h2>
<input id="pace">
<button onclick="calcSpeed()">Calculer</button>
<div id="speed_result"></div>
</div>

<!-- DISTANCE -->
<div class="card">
<h2>Distance</h2>
<input id="dist_time">
<input id="dist_speed">
<button onclick="calcDistance()">Calculer</button>
<div id="dist_result"></div>
</div>

<!-- FC -->
<div class="card">
<h2>Fréquence cardiaque</h2>
<input id="fcmax">
<input id="fcmoy">
<button onclick="analyseFC()">Analyser</button>
<div id="fcResult"></div>
</div>

<!-- CLASSEMENT -->
<div class="card" id="rank">
<h2>Classement</h2>
<input id="name" placeholder="Nom">
<input id="rankTime" placeholder="Temps">
<button onclick="addRunner()">Ajouter</button>
<div id="rankList"></div>
</div>

<!-- PROFIL -->
<div class="card" id="profil">
<h2>Profil</h2>
<input id="profilNom">
<input id="profilAge">
<input id="profilPoids">
<input id="profilFcMax">
<button onclick="saveProfile()">Sauvegarder</button>
</div>

</div>

</body>
</html>

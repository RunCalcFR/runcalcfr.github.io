<h2 id="accueil">🏠 Dashboard</h2>

<div class="grid">
<div class="card">
<h3>VO2 Max</h3>
<div id="homeVo2">--</div>
</div>

<div class="card">
<h3>Objectif</h3>
<div>5 km rapide</div>
</div>
</div>
<div class="card">
<h3>VO2 Max</h3>

<input id="vo2_distance" placeholder="Distance parcourue (km) ex: 5">
<input id="vo2_time" placeholder="Temps total (minutes) ex: 20">

<button onclick="calcVO2()">Calculer VO2 Max</button>
<div id="vo2_result" class="result"></div>
</div>
<div class="card">
<h3>Vitesse</h3>

<input id="pace" placeholder="Allure min/km ex: 4:30">

<button onclick="calcSpeed()">Calculer vitesse</button>
<div id="speed_result" class="result"></div>
</div>


<div class="card">
<h3>Distance</h3>

<input id="dist_time" placeholder="Temps (minutes) ex: 30">
<input id="dist_speed" placeholder="Vitesse (km/h) ex: 12">

<button onclick="calcDistance()">Calculer distance</button>
<div id="dist_result" class="result"></div>
</div>


<div class="card">
<h3>Fréquence cardiaque</h3>

<input id="fcmax" placeholder="FC max ex: 200">
<input id="fcmoy" placeholder="FC moyenne ex: 160">

<button onclick="analyseFC()">Analyser zone</button>
<div id="fcResult" class="result"></div>
</div>
<h2 id="perf">🚀 Performance</h2>

<div class="grid">

<div class="card">
<h3>Plan 5 km</h3>

<input id="time5k" placeholder="Temps 5 km (minutes) ex: 22">

<button onclick="plan5k()">Analyser niveau</button>
<div id="planResult" class="result"></div>
</div>


<div class="card">
<h3>Estimation performances</h3>

<input id="est_dist" placeholder="Distance actuelle (km) ex: 5">
<input id="est_time" placeholder="Temps réalisé (min) ex: 20">

<button onclick="estimate()">Estimer performances</button>
<div id="estResult" class="result"></div>
</div>


<div class="card">
<h3>Calcul des allures</h3>

<input id="allure5k" placeholder="Temps 5 km (min) ex: 20">

<button onclick="calcAllures()">Calculer allures</button>
<div id="allureResult" class="result"></div>
</div>

</div>
<h2 id="classement">🏆 Classement</h2>

<div class="card">

<input id="name" placeholder="Nom du coureur">
<input id="rankTime" placeholder="Temps (minutes) ex: 19.30">

<button onclick="addRunner()">Ajouter au classement</button>

<div id="rankList"></div>
</div>


<h2 id="profil">👤 Profil</h2>

<div class="card">

<input id="profilNom" placeholder="Nom complet">
<input id="profilAge" placeholder="Âge (ex: 14)">
<input id="profilPoids" placeholder="Poids (kg) ex: 60">
<input id="profilFcMax" placeholder="FC max ex: 200">

<button onclick="saveProfile()">Sauvegarder profil</button>

</div>
function safeNumber(value){
let n = Number(value);
return isNaN(n) ? 0 : n;
}

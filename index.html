<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc Pro Plus</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

header{
background:linear-gradient(90deg,#22c55e,#16a34a);
padding:25px;
text-align:center;
}

nav{
position:sticky;
top:0;
background:#111a2e;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:10px;
}

nav a{
color:white;
background:#22c55e;
padding:8px 12px;
border-radius:8px;
text-decoration:none;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
}

.card{
background:#111a2e;
padding:15px;
border-radius:12px;
}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
background:#0b1220;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
background:#22c55e;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:10px;
color:#60ffa8;
font-weight:bold;
}
</style>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBFpxJIxLgmbxKfdEaanhN4kuhWAf9pkTE",
  authDomain: "runcalc-38716.firebaseapp.com",
  projectId: "runcalc-38716",
  storageBucket: "runcalc-38716.appspot.com",
  messagingSenderId: "1065168370740",
  appId: "1:1065168370740:web:1c67250311a2bb665f5e61"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
</script>

</head>

<body>
  <header>
<h1>🏃 RunCalc Pro Plus</h1>
<p>Coach running intelligent</p>
</header>

<nav>
<a href="#accueil">Accueil</a>
<a href="#calculs">Calculs</a>
<a href="#perf">Performance</a>
<a href="#classement">Classement</a>
<a href="#profil">Profil</a>
</nav>

<div class="container">

<h2 id="accueil">🏠 Dashboard</h2>

<div class="grid">
<div class="card">
<h3>VO2 Max</h3>
<div id="homeVo2">--</div>
</div>

<div class="card">
<h3>Objectif</h3>
<div>5 km rapide</div>
</div>
</div>
<h2 id="calculs">📊 Calculs</h2>

<div class="grid">

<div class="card">
<h3>VO2 Max</h3>
<input id="vo2_distance">
<input id="vo2_time">
<button onclick="calcVO2()">Calculer</button>
<div id="vo2_result" class="result"></div>
</div>

<div class="card">
<h3>Vitesse</h3>
<input id="pace">
<button onclick="calcSpeed()">Calculer</button>
<div id="speed_result" class="result"></div>
</div>

<div class="card">
<h3>Distance</h3>
<input id="dist_time">
<input id="dist_speed">
<button onclick="calcDistance()">Calculer</button>
<div id="dist_result" class="result"></div>
</div>

<div class="card">
<h3>Fréquence cardiaque</h3>
<input id="fcmax">
<input id="fcmoy">
<button onclick="analyseFC()">Analyser</button>
<div id="fcResult" class="result"></div>
</div>

</div>
<h2 id="perf">🚀 Performance</h2>

<div class="grid">

<div class="card">
<h3>Plan 5 km</h3>
<input id="time5k">
<button onclick="plan5k()">Analyser</button>
<div id="planResult" class="result"></div>
</div>

<div class="card">
<h3>Estimation</h3>
<input id="est_dist">
<input id="est_time">
<button onclick="estimate()">Estimer</button>
<div id="estResult" class="result"></div>
</div>

<div class="card">
<h3>Allures</h3>
<input id="allure5k">
<button onclick="calcAllures()">Calculer</button>
<div id="allureResult" class="result"></div>
</div>

</div>

<h2 id="classement">🏆 Classement</h2>

<div class="card">
<input id="name" placeholder="Nom">
<input id="rankTime" placeholder="Temps">
<button onclick="addRunner()">Ajouter</button>

<div id="rankList"></div>
</div>

<h2 id="profil">👤 Profil</h2>

<div class="card">
<input id="profilNom">
<input id="profilAge">
<input id="profilPoids">
<input id="profilFcMax">
<button onclick="saveProfile()">Sauvegarder</button>
</div>
<script>

// VO2
function calcVO2(){
let d=+vo2_distance.value;
let t=+vo2_time.value;
let vo2=(3.5*(d/t*60)).toFixed(1);

vo2_result.innerText="VO2 Max : "+vo2;
homeVo2.innerText=vo2;
}

// SPEED
function calcSpeed(){
let [m,s]=pace.value.split(":").map(Number);
speed_result.innerText=(60/(m+s/60)).toFixed(2)+" km/h";
}

// DISTANCE
function calcDistance(){
dist_result.innerText=((+dist_time.value/60)*+dist_speed.value).toFixed(2)+" km";
}

// FC
function analyseFC(){
let pct=(+fcmoy.value/+fcmax.value)*100;

fcResult.innerText =
pct.toFixed(1)+"% - "+
(pct<70?"Récupération":
pct<80?"Endurance":
pct<88?"Seuil":
pct<95?"VO2 Max":"Max");
}

// PLAN
function plan5k(){
let t=+time5k.value;
planResult.innerText=
t>25?"Débutant":
t>21?"Intermédiaire":
"Avancé";
}

// ESTIMATION
function estimate(){
let d=+est_dist.value;
let t=+est_time.value;

estResult.innerHTML=
[5,10,21,42].map(x=>
x+" km : "+(t*Math.pow(x/d,1.06)).toFixed(1)+" min"
).join("<br>");
}

// ALLURES
function calcAllures(){
let t=+allure5k.value;
let a=t/5;

allureResult.innerHTML=
"EF "+(a+1.1).toFixed(2)+
" | Tempo "+(a+0.4).toFixed(2)+
" | Seuil "+(a+0.1).toFixed(2);
}


// AUTH
function signup(){
auth.createUserWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Compte créé"));
}

function login(){
auth.signInWithEmailAndPassword(email.value,password.value)
.then(()=>alert("Connecté"));
}

function logout(){auth.signOut();}


// PROFIL
function saveProfile(){
db.collection("profiles").doc(auth.currentUser.uid).set({
nom:profilNom.value,
age:profilAge.value,
poids:profilPoids.value,
fc:profilFcMax.value
});
}


// CLASSEMENT
function addRunner(){
db.collection("runners").add({
name:name.value,
time:+rankTime.value
});
loadRanking();
}

async function loadRanking(){
let snap=await db.collection("runners").orderBy("time").get();

let i=1,html="";

snap.forEach(d=>{
html+=i+++". "+d.data().name+" - "+d.data().time+" min<br>";
});

rankList.innerHTML=html;
}

loadRanking();

</script>
</div>
</body>
</html>

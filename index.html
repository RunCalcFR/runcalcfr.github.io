<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RunCalc</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

header {
  background: linear-gradient(90deg, #22c55e, #16a34a);
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 28px;
}

/* MENU */
nav {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 10px;
  background: #111a2e;
}

nav a {
  color: white;
  text-decoration: none;
  padding: 8px 12px;
  background: #22c55e;
  border-radius: 8px;
  font-weight: bold;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 20px;
  display: grid;
  gap: 15px;
}

.card {
  background: #111a2e;
  padding: 18px;
  border-radius: 15px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  background: #0b1220;
  color: white;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

.result {
  margin-top: 10px;
  color: #60ffa8;
}

.footer {
  text-align: center;
  opacity: 0.5;
  font-size: 12px;
  padding: 20px;
}
</style>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

</head>

<body>

<header>
  <h1>🏃 RunCalc</h1>
  <p>Ton coach running intelligent</p>
</header>

<!-- MENU PAGES -->
<nav>
  <a href="#vo2">VO2</a>
  <a href="#speed">Vitesse</a>
  <a href="#distance">Distance</a>
  <a href="#plan">Plan 5K</a>
  <a href="#fc">FC</a>
  <a href="#rank">Classement</a>
</nav>

<div class="container">

<!-- COMPTE -->
<div class="card">
  <h2>🔐 Compte utilisateur</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">

  <button onclick="signup()">Créer compte</button>
  <button onclick="login()">Connexion</button>
  <button onclick="logout()">Déconnexion</button>

  <div class="result" id="authMsg"></div>
</div>

<!-- VO2 -->
<div class="card" id="vo2">
  <h2>VO2 Max</h2>
  <input id="distance" placeholder="Distance (km)">
  <input id="timeMin" placeholder="Temps (min)">
  <button onclick="calcVO2()">Calculer VO2</button>
  <div class="result" id="vo2Result"></div>
</div>

<!-- SPEED -->
<div class="card" id="speed">
  <h2>Allure → Vitesse</h2>
  <input id="pace" placeholder="4:30 min/km">
  <button onclick="calcSpeed()">Calculer</button>
  <div class="result" id="speedResult"></div>
</div>

<!-- DISTANCE -->
<div class="card" id="distance">
  <h2>Distance</h2>
  <input id="time" placeholder="Temps (min)">
  <input id="speed" placeholder="Vitesse (km/h)">
  <button onclick="calcDistance()">Calculer</button>
  <div class="result" id="distResult"></div>
</div>

<!-- PLAN -->
<div class="card" id="plan">
  <h2>Plan 4 semaines - 5 km 17:30</h2>
  <input id="time5k" placeholder="Ton temps 5 km">
  <button onclick="analyseNiveau()">Analyser + programme</button>
  <div class="result" id="levelResult"></div>
  <div id="planResult"></div>
</div>

<!-- FC -->
<div class="card" id="fc">
  <h2>📊 Analyse séance (FC)</h2>
  <input id="fcmax" placeholder="FC max">
  <input id="fcmoy" placeholder="FC moyenne séance">
  <button onclick="analyseFC()">Analyser séance</button>
  <div class="result" id="fcResult"></div>
</div>

<!-- CLASSEMENT -->
<div class="card" id="rank">
  <h2>🏁 Classement mondial</h2>
  <input id="name" placeholder="Nom">
  <input id="rankTime" placeholder="Temps 5 km (min)">
  <button onclick="addRunner()">Ajouter</button>
  <div class="result" id="rankMsg"></div>
  <div id="rankList"></div>
</div>

</div>

<div class="footer">RunCalc © 2026</div>

<script>

// FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyCRtSV6MHQbUZuldnUvtT-_WXb5DmzxTek",
  authDomain: "runcalc-ef00e.firebaseapp.com",
  projectId: "runcalc-ef00e"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();


// AUTH
function signup() {
  auth.createUserWithEmailAndPassword(email.value, password.value)
    .then(() => authMsg.innerText = "Compte créé ✔");
}

function login() {
  auth.signInWithEmailAndPassword(email.value, password.value)
    .then(() => authMsg.innerText = "Connecté ✔");
}

function logout() {
  auth.signOut();
  authMsg.innerText = "Déconnecté";
}


// VO2
function calcVO2() {
  let d = Number(distance.value);
  let t = Number(timeMin.value);
  let vo2 = 0.2 * ((d * 1000) / t) + 3.5;
  vo2Result.innerText = "VO2 max : " + vo2.toFixed(1);
}


// SPEED
function calcSpeed() {
  let p = pace.value.split(":");
  let speed = 60 / (Number(p[0]) + Number(p[1] || 0) / 60);
  speedResult.innerText = speed.toFixed(2) + " km/h";
}


// DISTANCE
function calcDistance() {
  let t = Number(time.value);
  let s = Number(speed.value);
  distResult.innerText = ((t / 60) * s).toFixed(2) + " km";
}


// PLAN
function analyseNiveau() {
  let t = Number(time5k.value);

  let level =
    t > 25 ? "Débutant" :
    t > 21 ? "Intermédiaire" :
    "Avancé";

  levelResult.innerText = "Niveau : " + level;

  planResult.innerHTML = `
  S1: footing + 8x400m<br>
  S2: 10x400m + seuil<br>
  S3: 5x800m<br>
  S4: affûtage + test 5 km
  `;
}


// FC
function analyseFC() {
  let max = Number(fcmax.value);
  let moy = Number(fcmoy.value);

  let ratio = (moy / max) * 100;

  let type =
    ratio < 70 ? "🟢 Récupération" :
    ratio < 80 ? "🔵 Footing" :
    ratio < 88 ? "🟠 Seuil" :
    "🔴 Fractionné";

  fcResult.innerHTML =
    "Intensité : " + ratio.toFixed(1) + "%<br>" + type;
}


// CLASSEMENT
async function addRunner() {
  let user = auth.currentUser;

  if (!user) {
    rankMsg.innerText = "Connecte-toi";
    return;
  }

  await db.collection("runners").add({
    name: name.value,
    time: Number(rankTime.value),
    email: user.email
  });

  rankMsg.innerText = "Ajouté ✔";
  loadRanking();
}

async function loadRanking() {
  let snap = await db.collection("runners")
    .orderBy("time", "asc")
    .get();

  let html = "";
  let i = 1;

  snap.forEach(doc => {
    let d = doc.data();
    html += `${i}. ${d.name} - ${d.time} min<br>`;
    i++;
  });

  rankList.innerHTML = html;
}

loadRanking();

</script>

</body>
</html>
